version = 1
requires-python = ">=3.11"

[[package]]
name = "openenv-email-triage"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "openenv-core" },
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "pydantic" },
  { name = "openai" },
  { name = "requests" },
  { name = "pyyaml" },
]

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "anyio"
version = "4.4.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "idna" }, { name = "sniffio" }]

[[package]]
name = "annotated-types"
version = "0.7.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "certifi"
version = "2024.2.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "charset-normalizer"
version = "3.3.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "click"
version = "8.1.7"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "distro"
version = "1.9.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "fastapi"
version = "0.111.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "pydantic" }, { name = "starlette" }, { name = "typing-extensions" }]

[[package]]
name = "h11"
version = "0.14.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpcore"
version = "1.0.5"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "certifi" }, { name = "h11" }]

[[package]]
name = "httptools"
version = "0.6.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpx"
version = "0.27.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "anyio" }, { name = "certifi" }, { name = "httpcore" }, { name = "idna" }, { name = "sniffio" }]

[[package]]
name = "idna"
version = "3.7"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "jiter"
version = "0.4.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.30.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "anyio" }, { name = "distro" }, { name = "httpx" }, { name = "jiter" }, { name = "pydantic" }, { name = "sniffio" }, { name = "tqdm" }, { name = "typing-extensions" }]

[[package]]
name = "pydantic"
version = "2.7.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "annotated-types" }, { name = "pydantic-core" }, { name = "typing-extensions" }]

[[package]]
name = "pydantic-core"
version = "2.18.2"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "typing-extensions" }]

[[package]]
name = "python-dotenv"
version = "1.0.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.2"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "certifi" }, { name = "charset-normalizer" }, { name = "idna" }, { name = "urllib3" }]

[[package]]
name = "sniffio"
version = "1.3.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "starlette"
version = "0.37.2"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "anyio" }]

[[package]]
name = "tqdm"
version = "4.66.4"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "typing-extensions"
version = "4.12.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "urllib3"
version = "2.2.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.29.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [{ name = "click" }, { name = "h11" }, { name = "httptools" }, { name = "python-dotenv" }, { name = "pyyaml" }, { name = "uvloop" }, { name = "watchfiles" }, { name = "websockets" }]

[[package]]
name = "uvloop"
version = "0.19.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "watchfiles"
version = "0.22.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "websockets"
version = "12.0"
source = { registry = "https://pypi.org/simple" }
